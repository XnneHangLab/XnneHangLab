version: "3.9"

services:
  neo4j_mem0:
    image: neo4j:5
    container_name: membench-neo4j-mem0
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/neo4jneo4j
      - NEO4J_dbms_default__database=neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ./neo4j-data/mem0/data:/data
      - ./neo4j-data/mem0/logs:/logs

  neo4j_zep:
    image: neo4j:5
    container_name: membench-neo4j-zep
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/neo4jneo4j
      - NEO4J_dbms_default__database=neo4j
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - ./neo4j-data/zep/data:/data
      - ./neo4j-data/zep/logs:/logs

  neo4j_cognee:
    image: neo4j:5
    container_name: membench-neo4j-cognee
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/neo4jneo4j
      - NEO4J_dbms_default__database=neo4j
    ports:
      - "7476:7474"
      - "7689:7687"
    volumes:
      - ./neo4j-data/cognee/data:/data
      - ./neo4j-data/cognee/logs:/logs

  # NeoDash (Editor mode): 打开后手动配置连接 + Import dashboard JSON + 允许编辑
  neodash:
    image: neo4jlabs/neodash:latest
    container_name: membench-neodash
    restart: unless-stopped
    ports:
      - "5005:5005"
    depends_on:
      - neo4j_mem0
      - neo4j_zep
      - neo4j_cognee
