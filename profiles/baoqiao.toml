[profile]
name = "baoqiao"
description = "VTuber 主链路 - 薄巧"
agent_name = "baoqiao"

[character]
conf_name = "baoqiao-local"
conf_uid = "baoqiao-local-001"
live2d_model_name = "薄巧_完整版_调用版"
character_name = "薄巧"
avatar = "baoqiao.png"
human_name = "Human"

[character.tts_preprocessor]
remove_special_char = true
ignore_brackets = true
ignore_parentheses = true
ignore_asterisks = true
ignore_angle_brackets = true

[character.tts]
character_name = "baoqiao"

[character.tts.emotions.default]
path = "emotions/很适合夏天哦，我之前就是在这样清爽的氛围里面录了一支舞蹈。.wav"
ref_text = "很适合夏天哦，我之前就是在这样清爽的氛围里面录了一支舞蹈。"
speaker_audio_path = "emotions/neutral/neutral_01.wav"

[prompt]
persona = "prompts/characters/baoqiao.md"
format = "prompts/formats/baoqiao_emotion_bracket.md"

[plugins]
enabled = [
    "pre_tool_preview",
    "web_fetch",
    "screen_shot",
    "diary",
    "memory",
    "live2d_control",
    "web_search_ddg",
    "mood_chat",
]

[plugins.memory]
user_id = "xnne"
agent_id = "baoqiao"
search_limit = 3

[plugins.live2d_control]
appearance_presets = [
    { key = "默认", description = "厚刘海、披肩长发、麻花辫和发饰都保留的完整造型，整体更精致隆重，适合正式感更强的场合，但是看起来有点热。" },
    { key = "预设发型1", description = "短刘海露出额头，没有披发，保留单侧马尾，整体更轻盈清爽，像很适合夏天的可爱清凉发型。" },
    { key = "预设发型2", description = "长刘海遮住一侧眼睛，没有双马尾，保留披发，整体更有神秘感，像带一点小心机。" },
    { key = "隐藏披发", description = "去掉披发部分后，双马尾会显得更完整突出，整体更利落。" },
]
idle_clips = [
    { id = "idle_recorded_1", url = "idle1.motion3.json", weight = 1 },
    { id = "idle_recorded_2", url = "idle2.motion3.json", weight = 1 },
    { id = "idle_recorded_3", url = "idle3.motion3.json", weight = 1 },
    { id = "idle_recorded_4", url = "idle4.motion3.json", weight = 1 },
    { id = "idle_recorded_5", url = "idle5.motion3.json", weight = 1 },
    { id = "idle_recorded_6", url = "idle6.motion3.json", weight = 1 },
]

[plugins.live2d_control.idle_assignments.listening]
mode = "random_no_repeat"
clip_ids = [
    "idle_recorded_1",
    "idle_recorded_2",
    "idle_recorded_3",
    "idle_recorded_4",
    "idle_recorded_5",
    "idle_recorded_6",
]

[plugins.live2d_control.idle_assignments.speaking]
mode = "random_no_repeat"
clip_ids = [
    "idle_recorded_1",
    "idle_recorded_2",
    "idle_recorded_3",
    "idle_recorded_4",
    "idle_recorded_5",
    "idle_recorded_6",
]

[plugins.live2d_control.mixer_weights_by_state.listening]
idle_layer = 1
speech_layer = 0
backend_pose_layer = 0
mouse_attention_layer = 0.5

[plugins.live2d_control.mixer_weights_by_state.speaking]
idle_layer = 1
speech_layer = 0
backend_pose_layer = 0
mouse_attention_layer = 0.3

[plugins.mood_chat]
prompt = "请根据上下文，主动说些什么，如果上下文较少，或者最近正在做一些视觉上的工作，比如逛 pixiv 插画网站，或者玩 galgame，你可以调用截图能力（如果开启了的话），参与其中。"
