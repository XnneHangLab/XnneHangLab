[profile]
description = "VTuber 主链路 - 多工具，memory agent"

[character]
live2d_model_name = "Elaina"
character_name = "Elaina"
avatar = "ico_lss.png"
human_name = "Human"
default_expression_emotion = "平静"

[character.tts_preprocessor]
remove_special_char = true
ignore_brackets = true
ignore_parentheses = true
ignore_asterisks = true
ignore_angle_brackets = true

[character.tts]
character_name = "elaina"

[character.tts.emotions.default]
path = "elaina.wav"
ref_text = ""
speaker_audio_path = "elaina.wav"

[prompt]
persona = "prompts/characters/elaina.md"
format = "prompts/formats/emotion_bracket.md"
show_control_tags = false

[plugins]
enabled = [
    "pre_tool_preview",
    "tool_call_integrity",
    "web_search_ddg",
    "web_fetch",
    "screen_shot",
    "diary",
    "memory",
]

[plugins.memory]
user_id = "xnne"
agent_id = "elaina"
search_limit = 3
