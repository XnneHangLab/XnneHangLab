[profile]
name = "elaina"
description = "VTuber 主链路 - 多工具，memory agent"
agent_name = "elaina"

[character]
conf_name = "elaina-local"
conf_uid = "elaina-local-001"
live2d_model_name = "Elaina"
character_name = "Elaina"
avatar = "ico_lss.png"
human_name = "Human"

[character.tts_preprocessor]
remove_special_char = true
ignore_brackets = true
ignore_parentheses = true
ignore_asterisks = true
ignore_angle_brackets = true

[character.tts]
character_name = "elaina"

[character.tts.emotions]
default = "elaina.wav"

[prompt]
persona = "prompts/characters/elaina.md"
format = "prompts/formats/emotion_bracket.md"

[plugins]
enabled = [
    "web_search_ddg",
    "web_fetch",
    "screen_shot",
    "diary",
    "memory",
]

[plugins.memory]
user_id = "xnne"
agent_id = "elaina"
search_limit = 3
