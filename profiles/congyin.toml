[profile]
name = "congyin"
description = "聪音聊天链路 — /memory/chat，读写日记为主"
agent_name = "congyin"

[prompt]
persona = "prompts/characters/satone.md"
format = "prompts/formats/emotion_pipe.md"

[plugins]
enabled = ["pre_tool_preview", "tool_call_integrity", "web_fetch", "diary", "memory"]

[plugins.pre_tool_preview]
preview_max_chars = 24
preview_when_latency_over_ms = 2000
injection_position = "before_tools"

[plugins.web_fetch]
timeout_s = 15.0

[plugins.memory]
user_id = "xnne"
agent_id = "congyin"
search_limit = 3
# base_url 默认 http://localhost:12393，不填即可
