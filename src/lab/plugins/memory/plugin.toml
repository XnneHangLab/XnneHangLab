[plugin]
id = "memory"
name = "Memory Plugin"
version = "0.1.0"
type = "hook"
description = "每轮对话前从 memory_bench 召回相关记忆，注入 memory context"
author = "XnneHangLab"
source = "builtin"

[config]
base_url = "http://localhost:12393"
user_id = "xnne"
agent_id = "congyin"
search_limit = 10

[config_schema.base_url]
type = "str"
description = "Memory Bench 服务基础地址"

[config_schema.user_id]
type = "str"
description = "记忆读写使用的用户 ID"

[config_schema.agent_id]
type = "str"
description = "记忆读写使用的角色 ID"

[config_schema.search_limit]
type = "int"
description = "每轮注入的最大记忆条数"
min = 1
max = 100

[type_config]
entry = "MemoryPlugin"
requires_package = "memory_bench"
