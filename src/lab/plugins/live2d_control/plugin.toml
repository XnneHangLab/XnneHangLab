[plugin]
id = "live2d_control"
name = "Live2D Control"
version = "0.1.0"
type = "tool"
description = "Control persistent Live2D appearance and runtime state payloads."
author = "XnneHangLab"
source = "builtin"

[config]
appearance_presets = []

[config.states.listening]
mode = "random_no_repeat"
clips = []
idle_layer = 1.0
speech_layer = 1.0
backend_pose_layer = 1.0
mouse_attention_layer = 0.35

[config.states.speaking]
mode = "random_no_repeat"
clips = []
idle_layer = 1.0
speech_layer = 1.0
backend_pose_layer = 1.0
mouse_attention_layer = 0.35

[config_schema.appearance_presets]
type = "list"
description = "可切换的 Live2D 外观预设列表。按当前顺序保存为对象列表。需要根据 model_dict 的 emotion map 实际情况写 key name。"

[config_schema.appearance_presets.items]
type = "object"

[config_schema.appearance_presets.items.properties.key]
type = "str"
description = "可切换的外观 key"

[config_schema.appearance_presets.items.properties.description]
type = "str"
description = "该外观的说明文案"

[config_schema.states]
type = "object"
description = "按状态配置待机动作与 Pose Mixer 权重（推荐方式）。"

[config_schema.states.properties.listening]
type = "object"
description = "listening 状态配置。"

[config_schema.states.properties.listening.properties.mode]
type = "str"
description = "播放方式：random 或 random_no_repeat。"

[config_schema.states.properties.listening.properties.clips]
type = "list"
description = "该状态使用的待机动作片段列表。"

[config_schema.states.properties.listening.properties.clips.items]
type = "object"

[config_schema.states.properties.listening.properties.clips.items.properties.url]
type = "str"
description = "motion3.json 的相对路径或 URL。"

[config_schema.states.properties.listening.properties.idle_layer]
type = "float"
description = "待机层权重。"
min = 0

[config_schema.states.properties.listening.properties.speech_layer]
type = "float"
description = "说话层权重。"
min = 0

[config_schema.states.properties.listening.properties.backend_pose_layer]
type = "float"
description = "后端姿态层权重。"
min = 0

[config_schema.states.properties.listening.properties.mouse_attention_layer]
type = "float"
description = "鼠标注意力层权重。"
min = 0

[config_schema.states.properties.speaking]
type = "object"
description = "speaking 状态配置。"

[config_schema.states.properties.speaking.properties.mode]
type = "str"
description = "播放方式：random 或 random_no_repeat。"

[config_schema.states.properties.speaking.properties.clips]
type = "list"
description = "该状态使用的待机动作片段列表。"

[config_schema.states.properties.speaking.properties.clips.items]
type = "object"

[config_schema.states.properties.speaking.properties.clips.items.properties.url]
type = "str"
description = "motion3.json 的相对路径或 URL。"

[config_schema.states.properties.speaking.properties.idle_layer]
type = "float"
description = "待机层权重。"
min = 0

[config_schema.states.properties.speaking.properties.speech_layer]
type = "float"
description = "说话层权重。"
min = 0

[config_schema.states.properties.speaking.properties.backend_pose_layer]
type = "float"
description = "后端姿态层权重。"
min = 0

[config_schema.states.properties.speaking.properties.mouse_attention_layer]
type = "float"
description = "鼠标注意力层权重。"
min = 0

[type_config]
entry = "Live2DControlPlugin"
