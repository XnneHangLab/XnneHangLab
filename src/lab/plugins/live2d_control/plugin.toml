[plugin]
id = "live2d_control"
name = "Live2D Control"
version = "0.1.0"
type = "tool"
description = "通过 tool call 控制 Live2D 模型的持久形态切换（发型预设、部件显隐等）"
author = "XnneHangLab"
source = "builtin"

[config]
appearance_presets = []

[config_schema.appearance_presets]
type = "list"
description = "可切换的 Live2D 外观预设列表"

[config_schema.appearance_presets.items]
type = "object"

[config_schema.appearance_presets.items.properties.key]
type = "str"
description = "可切换的外观 key"

[config_schema.appearance_presets.items.properties.description]
type = "str"
description = "该外观的说明文案"

[type_config]
entry = "Live2DControlPlugin"
