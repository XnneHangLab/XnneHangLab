[project]
name = "Auto-Caption-Generate-Offline"
version = "2.4.0"
description = ""
readme = "README.md"
requires-python = ">=3.11,<3.12"
dependencies = [
    "funasr==1.2.6",
    "modelscope>=1.23.1",
    "numpy==1.26.4",
    "torch==2.1.0",
    "torchaudio==2.1.0",
    "tomli_w==1.2.0",
    "pydantic==2.10.6",
    "setuptools==76.0.0",
    "streamlit==1.43.2",
    "streamlit-antd-components==0.3.2",
    "pandas==2.2.3",
]
authors = [{ name = "MrXnneHang", email = "XnneHang@gmail.com" }]
keywords = []
license = { text = "MIT" }
classifiers = [
  "Operating System :: OS Independent",
  "License :: OSI Approved :: MIT License",
  "Typing :: Typed",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: Implementation :: CPython",
]

[project.urls]
Homepage = "https://github.com/MrXnneHang/Auto_Caption_Generated_Offline"
Documentation = "https://github.com/MrXnneHang/Auto_Caption_Generated_Offline"
Repository = "https://github.com/MrXnneHang/Auto_Caption_Generated_Offline"
Issues = "https://github.com/MrXnneHang/Auto_Caption_Generated_Offline/issues"

[project.scripts]
test = "uiya.test:main"
acgo = "uiya.cli:main"
uiya = "uiya.ui:main"

[tool.uv.workspace]
members = ["packages/*"]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[tool.uv.sources]
torch = [
  { index = "pytorch-cpu" },
]
torchaudio = [
  { index = "pytorch-cpu" },
]

[tool.pyright]
include = ["src/uiya", "tests"]
pythonVersion = "3.11"
typeCheckingMode = "strict"

[tool.hatch.build.targets.wheel]
packages = ["src/uiya"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# 选取的该版本 Pytorch 仅仅支持 310 311.
# < 3.11 需要额外安装 tomlilib 
# < 3.11 不支持 *tuple 的解包。(_dataclass.py 中涉及)
# 于是，该项目只能在 3.11 运行，3.12 及以上需要考虑手动升级 pytorch。