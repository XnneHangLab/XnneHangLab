name: Unit Test
on:
  push:
    branches: [dev]
  pull_request:
  merge_group:
  workflow_dispatch:
jobs:
  unit-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
        architecture: ["x64"]
    name: Python ${{ matrix.python-version }} on ${{ matrix.architecture }} unit test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.architecture }}
      - name: Install just
        uses: extractions/setup-just@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
      - name: pull submodules
        run: |
          git submodule update --init --recursive
      - name: Install dependencies
        run: |
          just ci-install
          
      - name: Cache FFmpeg
        id: cache-ffmpeg
        uses: actions/cache@v4
        with:
          path: ~/.local/bin/ffmpeg
          key: ${{ runner.os }}-ffmpeg-static-6.0 # 使用一个清晰的键，例如包含版本号

      - name: Download FFmpeg if not cached
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        run: |
          FFMPEG_URL="https://github.com/eugeneware/ffmpeg-static/releases/download/b6.0/ffmpeg-linux-x64"
          mkdir -p ~/.local/bin
          curl -L $FFMPEG_URL -o ~/.local/bin/ffmpeg
          chmod +x ~/.local/bin/ffmpeg

      - name: Add FFmpeg to PATH
        run: |
          echo "~/.local/bin" >> $GITHUB_PATH

      - name: Verify FFmpeg
        run: |
          ffmpeg -version

      - name: Run unit tests
        run: |
          just ci-test
